<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Brew</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:        #FFFFFF;
      --accent-glow:   rgba(255, 255, 255, 0.08);
      --accent-border: rgba(255, 255, 255, 0.22);
      --purple:        #B07FE0;
      --purple-glow:   rgba(176, 127, 224, 0.12);
      --purple-border: rgba(176, 127, 224, 0.30);
      --surface:       rgba(12, 6, 22, 0.82);
      --surface-solid: #0C0616;
      --card-hover:    rgba(255, 255, 255, 0.05);
      --border:        rgba(255, 255, 255, 0.09);
      --text:          #F2F2F2;
      --muted:         #888888;
      --muted-light:   #555555;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: #130920;
      background-image: url('image.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .header-left { display: flex; align-items: center; gap: 13px; }

    .logo-img {
      width: 40px; height: 40px;
      object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(200, 100, 255, 0.5));
    }
    .logo-fallback {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--accent-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: var(--accent); flex-shrink: 0;
    }
    .header-titles h1 {
      font-size: 18px; font-weight: 700;
      color: var(--accent); letter-spacing: -0.3px; line-height: 1.2;
    }
    .header-titles .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 16px; }
    #next-refresh  { font-size: 11px; color: var(--muted-light); }
    #last-updated  { font-size: 11px; color: var(--muted); }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--accent-border);
      color: var(--accent); padding: 7px 14px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 600; letter-spacing: 0.2px;
      transition: background 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover  { background: var(--accent-glow); border-color: rgba(255,255,255,0.4); }
    .refresh-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .refresh-btn svg  { transition: transform 0.15s; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIGEST STRIP ───────────────────────────── */
    #digest-strip {
      flex-shrink: 0;
      background: rgba(6, 2, 14, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 460px;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #digest-strip.collapsed { max-height: 48px; }

    #digest-toggle-row {
      display: flex; align-items: center;
      padding: 0 28px; height: 48px;
      cursor: pointer; gap: 12px; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    #digest-toggle-row:hover { background: rgba(255,255,255,0.015); }

    .digest-day-label {
      font-size: 12px; font-weight: 700;
      color: var(--purple); letter-spacing: 0.2px; white-space: nowrap;
    }
    .digest-sep { color: var(--muted-light); font-size: 12px; }
    .digest-title-label {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.75); flex: 1; letter-spacing: -0.1px;
    }
    .digest-chevron { color: var(--muted-light); transition: transform 0.3s; flex-shrink: 0; }
    #digest-strip.collapsed .digest-chevron { transform: rotate(-90deg); }

    #digest-content {
      display: flex; gap: 14px;
      padding: 16px 24px 20px;
      overflow-x: auto; overflow-y: hidden;
    }
    #digest-content::-webkit-scrollbar { height: 3px; }
    #digest-content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1); border-radius: 2px;
    }

    /* ── DIGEST CARD ─────────────────────────────── */
    .digest-card {
      min-width: 420px; max-width: 420px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px; padding: 18px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .digest-card-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .digest-topic-pill {
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.8px; color: #0C0616;
      background: var(--purple); padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .digest-source {
      font-size: 10px; color: var(--muted-light);
      text-align: right; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Headline — biggest element on the card */
    .digest-headline {
      font-size: 15px; font-weight: 700; line-height: 1.4;
      letter-spacing: -0.2px;
    }
    .digest-headline a { color: var(--text); text-decoration: none; }
    .digest-headline a:hover { color: rgba(255,255,255,0.65); text-decoration: underline; }

    /* Article summary snippet */
    .digest-snippet {
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }

    /* Trendjack — left-border callout, minimal */
    .digest-trendjack {
      border-left: 2px solid rgba(176, 127, 224, 0.55);
      padding: 4px 0 4px 14px;
    }
    .trendjack-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .trendjack-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted-light);
    }
    .pillar-badge {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; color: var(--purple);
      border: 1px solid rgba(176,127,224,0.35);
      border-radius: 3px; padding: 1px 6px; white-space: nowrap;
    }
    .trendjack-text {
      font-size: 12.5px; color: rgba(230, 220, 245, 0.9);
      line-height: 1.6; font-style: italic;
    }

    /* Talking points */
    .digest-points-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted-light); margin-bottom: 8px;
    }
    .digest-points-list {
      list-style: none; padding: 0;
      display: flex; flex-direction: column; gap: 7px;
    }
    .digest-points-list li {
      font-size: 12px; color: rgba(190, 190, 190, 0.85);
      line-height: 1.55; padding-left: 14px; position: relative;
    }
    .digest-points-list li::before {
      content: '–'; position: absolute; left: 0;
      color: var(--muted-light); font-size: 12px; line-height: 1.5;
    }

    .digest-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 24px 8px; font-size: 12px; color: var(--muted);
    }
    .digest-loading .spinner-sm {
      width: 14px; height: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.75s linear infinite; flex-shrink: 0;
    }
    .digest-empty {
      padding: 24px 8px; font-size: 12px;
      color: var(--muted); font-style: italic;
    }

    /* ── MAIN GRID ───────────────────────────────── */
    main {
      display: grid; grid-template-columns: 1fr 1fr;
      flex: 1; overflow: hidden; min-height: 0;
    }

    .panel {
      display: flex; flex-direction: column; overflow: hidden;
      border-right: 1px solid var(--border);
      background: rgba(10, 4, 18, 0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .panel:last-child { border-right: none; }

    /* ── PANEL HEADER ────────────────────────────── */
    .panel-header {
      background: var(--surface);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 22px 14px; flex-shrink: 0;
    }
    .panel-title-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title-row h2 {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted-light);
    }
    .article-count {
      font-size: 10px; color: var(--muted-light);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 2px 9px; border-radius: 20px;
    }

    /* ── TOPIC FILTER TAGS ───────────────────────── */
    .topic-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .topic-tag {
      font-size: 10px; font-weight: 600;
      color: var(--muted); background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 11px; border-radius: 20px;
      letter-spacing: 0.2px; cursor: pointer; user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .topic-tag:hover:not(.active) {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .topic-tag.active {
      background: rgba(176,127,224,0.18);
      color: var(--purple);
      border-color: rgba(176,127,224,0.45);
      font-weight: 700;
    }

    #napster-panel .panel-header { border-left: 3px solid rgba(255,255,255,0.5); }
    #ai-panel .panel-header      { border-left: 3px solid var(--purple); }

    /* ── ARTICLES SCROLL ─────────────────────────── */
    .articles-scroll { flex: 1; overflow-y: auto; padding: 8px 10px 20px; }
    .articles-scroll::-webkit-scrollbar { width: 3px; }
    .articles-scroll::-webkit-scrollbar-track { background: transparent; }
    .articles-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── ARTICLE CARD ────────────────────────────── */
    .article-card { padding: 16px 14px; border-radius: 8px; transition: background 0.12s; }
    .article-card:hover { background: var(--card-hover); }
    .article-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }

    /* White accent for Napster panel, subtle for AI panel */
    #napster-panel .source-dot  { width: 4px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%; flex-shrink: 0; }
    #napster-panel .source-name { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.7px; }
    #ai-panel .source-dot  { width: 4px; height: 4px; background: rgba(176,127,224,0.7); border-radius: 50%; flex-shrink: 0; }
    #ai-panel .source-name { font-size: 10px; font-weight: 700; color: rgba(176,127,224,0.75); text-transform: uppercase; letter-spacing: 0.7px; }

    .sep          { color: var(--muted-light); font-size: 10px; }
    .article-date { font-size: 10px; color: var(--muted-light); }

    /* Article title — clear and readable */
    .article-title { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 6px; letter-spacing: -0.1px; }
    .article-title a { color: var(--text); text-decoration: none; transition: color 0.12s; }
    #napster-panel .article-title a:hover { color: #FFFFFF; text-decoration: underline; }
    #ai-panel      .article-title a:hover { color: rgba(200,170,240,0.9); }

    .article-desc {
      font-size: 12px; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 0 14px; }

    /* ── LOADING ─────────────────────────────────── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 60px 24px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-state p { font-size: 12px; color: var(--muted); }

    /* ── ERROR ───────────────────────────────────── */
    .error-state  { padding: 40px 24px; text-align: center; }
    .error-state .error-icon { font-size: 28px; margin-bottom: 10px; }
    .error-state p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .error-state .err-detail {
      margin-top: 8px; font-size: 11px; color: var(--muted-light);
      font-family: monospace;
      background: rgba(255,255,255,0.04);
      padding: 8px 12px; border-radius: 5px;
      border: 1px solid var(--border);
      text-align: left; word-break: break-all;
    }

    /* ── EMPTY ───────────────────────────────────── */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-state p { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<header>
  <div class="header-left">
    <img
      src="napster-logo.png"
      class="logo-img" alt="Napster"
      onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
    />
    <div class="logo-fallback" id="logo-fallback" style="display:none;">N</div>
    <div class="header-titles">
      <h1>Morning Brew</h1>
      <div class="subtitle" id="last-updated">Loading news...</div>
    </div>
  </div>
  <div class="header-right">
    <span id="next-refresh"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M11 6.5A4.5 4.5 0 1 1 6.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6.5 2L9 4M6.5 2L9 0.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<!-- ── DIGEST STRIP ───────────────────────────────── -->
<div id="digest-strip">
  <div id="digest-toggle-row" onclick="toggleDigest()">
    <span class="digest-day-label" id="digest-date-label">—</span>
    <span class="digest-sep">·</span>
    <span class="digest-title-label">Your Digest for the Day</span>
    <svg class="digest-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div id="digest-content">
    <div class="digest-loading">
      <div class="spinner-sm"></div>
      Generating digest…
    </div>
  </div>
</div>

<!-- ── MAIN GRID ──────────────────────────────────── -->
<main>
  <!-- LEFT: Napster News -->
  <section class="panel" id="napster-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>Napster in the News</h2>
        <span class="article-count" id="napster-count">—</span>
      </div>
    </div>
    <div class="articles-scroll" id="napster-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching Napster news…</p>
      </div>
    </div>
  </section>

  <!-- RIGHT: AI & Tech News -->
  <section class="panel" id="ai-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>AI &amp; Technology Intelligence</h2>
        <span class="article-count" id="ai-count">—</span>
      </div>
      <div class="topic-tags" id="topic-tags"><!-- Built by JS --></div>
    </div>
    <div class="articles-scroll" id="ai-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching AI &amp; tech news…</p>
      </div>
    </div>
  </section>
</main>

<script>

  // Select the best-matching variant for a given article
  function getPillarContent(pillar, articleText) {
    const raw = articleText.toLowerCase();
    for (const variant of pillar.variants) {
      if (variant.triggers.length > 0 && variant.triggers.some(kw => raw.includes(kw))) {
        return { angle: variant.angle, talkingPoints: variant.talkingPoints };
      }
    }
    const def = pillar.variants[pillar.variants.length - 1];
    return { angle: def.angle, talkingPoints: def.talkingPoints };
  }

  // ── PUBLICATION CREDIBILITY RANKING ───────────────────
  const SOURCE_RANK = {
    'reuters': 100, 'associated press': 99, 'bloomberg': 98,
    'the new york times': 97, 'the wall street journal': 96,
    'bbc news': 95, 'cnn': 94, 'the guardian': 93,
    'washington post': 92, 'forbes': 91, 'financial times': 90,
    'the economist': 89, 'time': 88, 'nbcnews': 87, 'abc news': 86,
    'techcrunch': 85, 'the verge': 84, 'wired': 83,
    'ars technica': 82, 'cnet': 81, 'engadget': 80,
    'mashable': 79, 'venturebeat': 78, 'zdnet': 77,
    'mit technology review': 76, 'ieee spectrum': 75,
    'gizmodo': 74, 'pcmag': 73, "tom's hardware": 72,
    'business insider': 70, 'fast company': 69, 'inc.': 68,
    'axios': 67, 'the information': 66, 'fortune': 65,
    'quartz': 64, 'protocol': 63,
    'variety': 60, 'billboard': 59, 'rolling stone': 58,
    'pitchfork': 57, 'the hollywood reporter': 56, 'deadline': 55,
    'music business worldwide': 54, 'digital music news': 53,
    'musicweek': 52, 'nme': 51, 'consequence': 50, 'loudwire': 49,
    'ai business': 48, 'ai news': 47, 'the ai beat': 46, 'import ai': 45,
    'coindesk': 42, 'cointelegraph': 41, 'decrypt': 40, 'the block': 39,
  };

  function getSourceScore(name) {
    if (!name) return 20;
    return SOURCE_RANK[name.toLowerCase().trim()] ?? 30;
  }

  // ── STATE ──────────────────────────────────────────────
  const aiCache       = {};
  let   activeFilter  = 'All';
  let   autoRefreshTimer = null;
  let   countdownTimer   = null;
  let   nextRefreshAt    = null;

  // ── UTILITIES ──────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (secs < 60)    return 'Just now';
    if (secs < 3600)  return `${Math.floor(secs/60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
    return `${Math.floor(secs/86400)}d ago`;
  }
  function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }); }
  function fmtDate(d) { return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
  function fmtCountdown(ms) {
    if (ms <= 0) return '';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `Next refresh in ${h}h ${String(m).padStart(2,'0')}m`;
  }
  function getDigestDateLabel() {
    const d = new Date();
    const day  = d.toLocaleDateString('en-US', { weekday:'long' });
    const date = d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    return `${day}, ${date}`;
  }

  // ── FETCH ──────────────────────────────────────────────
  const ON_LOCALHOST = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const CORS_PROXY   = 'https://corsproxy.io/?';

  async function fetchNews(query) {
    const params = new URLSearchParams({
      q: query, sortby: 'publishedAt', lang: 'en',
      max: String(PAGE_SIZE), token: API_KEY
    });
    const apiUrl = `${GNEWS_BASE}?${params}`;
    const url    = ON_LOCALHOST ? apiUrl : `${CORS_PROXY}${encodeURIComponent(apiUrl)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try {
        const e = await r.json();
        msg += ': ' + (e.errors ? Object.values(e.errors).join(', ') : JSON.stringify(e));
      } catch (_) {}
      throw new Error(msg);
    }
    const d = await r.json();
    if (d.errors) throw new Error(Object.values(d.errors).join(', '));
    return d.articles || [];
  }

  // ── SORT & DEDUP ───────────────────────────────────────
  function sortByCredibility(articles) {
    return [...articles].sort((a,b) => getSourceScore(b.source?.name) - getSourceScore(a.source?.name));
  }
  function dedup(articles) {
    const seen = new Set();
    return articles.filter(a => {
      const key = a.url || a.title;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
  }

  // ── DIGEST SCORING ─────────────────────────────────────
  function scoreArticleForDigest(article) {
    // ── Quality gates ──────────────────────────────────────
    if (!article.url || !article.url.startsWith('http'))   return null; // must have real URL
    if (!article.title || article.title === '[Removed]')   return null; // must have title
    if (!article.description || article.description.length < 20) return null; // must have some description

    const raw = ((article.title || '') + ' ' + (article.description || '')).toLowerCase();

    // Topic match
    let bestTopic = null, topicScore = 0;
    for (const t of DIGEST_TOPICS) {
      const hits = t.keywords.filter(kw => raw.includes(kw)).length;
      if (hits > topicScore) { topicScore = hits; bestTopic = t; }
    }
    if (!bestTopic || topicScore === 0) return null; // must match a digest topic

    // Pillar match
    let bestPillar = null, pillarScore = 0;
    for (const p of DIGEST_PILLARS) {
      const hits = p.keywords.filter(kw => raw.includes(kw)).length;
      if (hits > pillarScore) { pillarScore = hits; bestPillar = p; }
    }
    // Fallback to topic's natural pillar
    if (!bestPillar || pillarScore === 0) {
      const defaultId = TOPIC_DEFAULT_PILLAR[bestTopic.id] || 1;
      bestPillar = DIGEST_PILLARS.find(p => p.id === defaultId) || DIGEST_PILLARS[0];
    }

    const credibility    = getSourceScore(article.source?.name) / 100;
    const total          = (topicScore * 3) + (pillarScore * 2) + (credibility * 2);
    const pillarContent  = getPillarContent(bestPillar, raw);

    return { article, topic: bestTopic, pillar: bestPillar, pillarContent, score: total };
  }

  function generateDigestPicks() {
    const allArticles = dedup(Object.values(aiCache).flat());

    const scored = allArticles
      .map(scoreArticleForDigest)
      .filter(Boolean)
      .sort((a, b) => b.score - a.score);

    // Max 4, one per source, ensure topic variety where possible
    const seenSources = new Set();
    const seenTopics  = new Set();
    const picks = [];

    // First pass: prefer topic variety
    for (const item of scored) {
      const src   = (item.article.source?.name || 'unknown').toLowerCase();
      const topic = item.topic.id;
      if (!seenSources.has(src) && !seenTopics.has(topic)) {
        seenSources.add(src);
        seenTopics.add(topic);
        picks.push(item);
        if (picks.length === 4) break;
      }
    }
    // Second pass: fill remaining slots if we don't have 4 yet
    if (picks.length < 4) {
      for (const item of scored) {
        const src = (item.article.source?.name || 'unknown').toLowerCase();
        if (!seenSources.has(src)) {
          seenSources.add(src);
          picks.push(item);
          if (picks.length === 4) break;
        }
      }
    }
    return picks;
  }

  function renderDigest(picks) {
    const container = document.getElementById('digest-content');
    document.getElementById('digest-date-label').textContent = getDigestDateLabel();

    if (!picks || picks.length === 0) {
      container.innerHTML = '<p class="digest-empty">No strong candidates found in today\'s articles — check back after the next refresh.</p>';
      return;
    }

    container.innerHTML = picks.map(pick => `
      <div class="digest-card">
        <div class="digest-card-top">
          <span class="digest-topic-pill">${esc(pick.topic.label)}</span>
          <span class="digest-source">${esc(pick.article.source?.name || '')}${pick.article.publishedAt ? ' · ' + timeAgo(pick.article.publishedAt) : ''}</span>
        </div>
        <div class="digest-headline">
          <a href="${esc(pick.article.url)}" target="_blank" rel="noopener noreferrer">${esc(pick.article.title)}</a>
        </div>
        ${pick.article.description ? `<p class="digest-snippet">${esc(pick.article.description.slice(0,160))}${pick.article.description.length > 160 ? '…' : ''}</p>` : ''}
        <div class="digest-trendjack">
          <div class="trendjack-header">
            <span class="trendjack-label">Trendjacking Opportunity</span>
            <span class="pillar-badge">${esc(pick.pillar.name)}</span>
          </div>
          <p class="trendjack-text">${esc(pick.pillarContent.angle)}</p>
        </div>
        <div>
          <div class="digest-points-label">What to say on your next call</div>
          <ul class="digest-points-list">
            ${pick.pillarContent.talkingPoints.map(pt => `<li>${esc(pt)}</li>`).join('')}
          </ul>
        </div>
      </div>
    `).join('');
  }

  function toggleDigest() {
    document.getElementById('digest-strip').classList.toggle('collapsed');
  }

  // ── RENDER ARTICLE CARDS ───────────────────────────────
  function renderCards(articles, scrollId, countId) {
    const scroll  = document.getElementById(scrollId);
    const countEl = document.getElementById(countId);
    const valid   = articles.filter(a => a.title && a.title !== '[Removed]' && a.url);

    if (valid.length === 0) {
      scroll.innerHTML = '<div class="empty-state"><p>No articles found.</p></div>';
      countEl.textContent = '0 articles';
      return;
    }
    countEl.textContent = `${valid.length} article${valid.length !== 1 ? 's' : ''}`;
    scroll.innerHTML = valid.map((a, i) => `
      <div class="article-card">
        <div class="article-meta">
          <div class="source-dot"></div>
          <span class="source-name">${esc(a.source?.name || 'Unknown')}</span>
          <span class="sep">·</span>
          <span class="article-date">${timeAgo(a.publishedAt)}</span>
        </div>
        <div class="article-title">
          <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">${esc(a.title)}</a>
        </div>
        ${a.description ? `<p class="article-desc">${esc(a.description)}</p>` : ''}
      </div>
      ${i < valid.length - 1 ? '<div class="card-divider"></div>' : ''}
    `).join('');
  }

  function renderAIArticles() {
    let articles;
    if (activeFilter === 'All') {
      const PER_TOPIC = 7;
      const balanced = Object.values(aiCache).flatMap(items =>
        sortByCredibility(items).slice(0, PER_TOPIC)
      );
      articles = sortByCredibility(dedup(balanced));
    } else {
      articles = sortByCredibility(aiCache[activeFilter] || []);
    }
    renderCards(articles, 'ai-articles', 'ai-count');
  }

  function showLoading(scrollId, msg) {
    document.getElementById(scrollId).innerHTML =
      `<div class="loading-state"><div class="spinner"></div><p>${esc(msg)}</p></div>`;
  }
  function showError(scrollId, countId, err) {
    document.getElementById(scrollId).innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠</div>
        <p>Could not load articles. Check your internet connection and try refreshing.</p>
        <div class="err-detail">${esc(String(err))}</div>
      </div>`;
    document.getElementById(countId).textContent = 'Error';
  }

  // ── FILTER TAGS ────────────────────────────────────────
  function buildFilterTags() {
    const container = document.getElementById('topic-tags');
    container.innerHTML = AI_TOPICS.map(t => `
      <span class="topic-tag ${t.label === 'All' ? 'active' : ''}"
            data-topic="${esc(t.label)}">${esc(t.label)}</span>
    `).join('');
    container.addEventListener('click', e => {
      const tag = e.target.closest('.topic-tag');
      if (!tag) return;
      activeFilter = tag.dataset.topic;
      document.querySelectorAll('.topic-tag').forEach(el =>
        el.classList.toggle('active', el.dataset.topic === activeFilter)
      );
      renderAIArticles();
      document.getElementById('ai-articles').scrollTop = 0;
    });
  }

  // ── LOAD ───────────────────────────────────────────────
  async function loadNapster() {
    showLoading('napster-articles', 'Fetching Napster news…');
    try {
      const articles = await fetchNews('Napster');
      renderCards(sortByCredibility(articles), 'napster-articles', 'napster-count');
    } catch (err) {
      showError('napster-articles', 'napster-count', err);
    }
  }

  async function loadAI() {
    showLoading('ai-articles', 'Fetching AI & tech news…');
    document.getElementById('ai-count').textContent = 'Loading…';
    document.getElementById('digest-content').innerHTML =
      '<div class="digest-loading"><div class="spinner-sm"></div>Generating digest…</div>';

    Object.keys(aiCache).forEach(k => delete aiCache[k]);

    const topicsToFetch = AI_TOPICS.filter(t => t.query !== null);
    const results = await Promise.allSettled(
      topicsToFetch.map(t => fetchNews(t.query).then(articles => ({ label: t.label, articles })))
    );

    let anySuccess = false;
    results.forEach(r => {
      if (r.status === 'fulfilled') {
        aiCache[r.value.label] = r.value.articles;
        anySuccess = true;
      }
    });

    if (!anySuccess) {
      const firstErr = results.find(r => r.status === 'rejected');
      showError('ai-articles', 'ai-count', firstErr?.reason || 'Unknown error');
      document.getElementById('digest-content').innerHTML =
        '<p class="digest-empty">Could not generate digest — news failed to load.</p>';
      return;
    }

    renderAIArticles();

    // Build digest from fetched AI articles
    const picks = generateDigestPicks();
    renderDigest(picks);
  }

  // ── REFRESH ────────────────────────────────────────────
  async function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('spinning');
    document.getElementById('last-updated').textContent = 'Refreshing…';

    await Promise.all([loadNapster(), loadAI()]);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${fmtDate(now)} at ${fmtTime(now)}`;

    nextRefreshAt = Date.now() + REFRESH_MS;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      document.getElementById('next-refresh').textContent =
        fmtCountdown(nextRefreshAt - Date.now());
    }, 60_000);
    document.getElementById('next-refresh').textContent =
      fmtCountdown(nextRefreshAt - Date.now());

    btn.disabled = false;
    btn.classList.remove('spinning');
  }

  // ── INIT ───────────────────────────────────────────────
  document.getElementById('digest-date-label').textContent = getDigestDateLabel();
  buildFilterTags();
  refreshAll();
  autoRefreshTimer = setInterval(refreshAll, REFRESH_MS);
</script>
